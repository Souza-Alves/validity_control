name: controle_validades
description: "Controle de Validades - Gerenciamento de Vencimentos"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.0
  excel: ^4.0.0
  intl: ^0.19.0
  file_selector: ^1.1.0
  file_selector_android: '^0.5.2+6'
  shared_preferences: ^2.3.5
  url_launcher: ^6.3.1
  supabase_flutter: ^2.5.0
  connectivity_plus: ^6.0.0
  image_gallery_saver_plus: ^5.0.0
  open_filex_plus: ^4.7.3
  flutter_email_sender: ^10.0.0
  android_intent_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/
  config:
    enable-swift-package-manager: false   

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#7BAD48"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icon.png"
  